name: Dependencies verification

on:
  pull_request:
    branches: [ "dependabot/gradle/**" ]

  workflow_dispatch:

jobs:
  locksAndVerificationData:
    name: Update lock file & verification metadata
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Run gradle command
        run: ./gradlew dependencies
          --write-locks
          --write-verification-metadata sha256,pgp
          --export-keys

      - name: Check for modified files
        id: git-check
        run: echo "modified=$(if git diff-index --quiet HEAD --; then echo "false"; else echo "true"; fi)" >> $GITHUB_OUTPUT

      - name: Configurate git for commit
        if: steps.git-check.outputs.modified == 'true'
        run: |
          git config --global user.name 'Kenneth Cartanyà Mendoza'
          git config --global user.email 'knthcame@gmail.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Commit
        run: |
          git add gradle/**
          git add **/gradle.lockfile
          git commit -m "Updated lockfile & verification metadata"

      - name: Push
        run: git push
